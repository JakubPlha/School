<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence receptů</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Evidence receptů</h1>
        <nav>
            <ul>
                <li><a href="#recepty">Recepty</a></li>
                <li><a href="#pridat-recept">Přidat recept</a></li>
                <li><a href="#statistiky">Statistiky</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="recepty">
            <h2>Přehled receptů</h2>
            <input type="text" id="search" placeholder="Vyhledat recept...">
            <div id="recipes-container" class="recipes-grid">
            </div>
        </section>

        <section id="pridat-recept">
            <h2>Přidat recept</h2>
            <form id="add-recipe-form">
                <label for="recipe-name">Název receptu (max 15 znaků):</label>
                <input type="text" id="recipe-name" maxlength="15" required>
                
                <label for="prep-time">Doba přípravy (minuty):</label>
                <input type="number" id="prep-time" min="1" required>
                
                <button type="submit">Přidat recept</button>
            </form>
        </section>

        <section id="statistiky">
            <h2>Statistiky</h2>
            <p>Statistiky budou implementovány později.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
